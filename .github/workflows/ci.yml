# Continuous Integration for the starter service.
# This is the "CI" in CI/CD: every push and pull request runs the tests.
# When you push this folder as your own GitHub repo, watch the "Actions" tab go green.
#
# NOTE: GitHub only runs workflow files that live at the REPO ROOT, under
# .github/workflows/. The Week 0 lab tells you to push the *contents* of
# project/starter/ as a new repo, so this file ends up at the root — exactly
# where GitHub expects it. (If instead you fork the whole course repo, move
# this file to the repo's top-level .github/workflows/ and add
# `working-directory: project/starter` under each run step.)

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q
